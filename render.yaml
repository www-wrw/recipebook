services:
  - type: web
    name: recipebook-backend
    runtime: node
    buildCommand: npm install -w backend
    startCommand: npm start -w backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: recipebook-db
          property: connectionString

  - type: static
    name: recipebook-frontend
    buildCommand: npm install && npm run build -w frontend
    staticPublishPath: frontend/dist

databases:
  - name: recipebook-db
    databaseName: recipebook
    user: recipebook_user
